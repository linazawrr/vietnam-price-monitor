name: Check Vietnam trip prices

on:
  schedule:
    # Almaty is UTC+5 year-round: 09:00 and 18:00 Almaty time
    - cron: '0 4,13 * * *'
  workflow_dispatch:

concurrency:
  group: check-prices
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright chromium
        run: playwright install --with-deps chromium

      - name: Check flights (Aviasales/Travelpayouts)
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_flights.py

      - name: Check charter flights (ht.kz)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_charter_flights.py

      - name: Check tours
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_tours.py

      - name: Check HT.KZ Telegram channel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_telegram_channel.py

      - name: Persist alert-throttle state
        run: |
          if ! git diff --quiet -- state/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "Update alert state [skip ci]"
            git push
          else
            echo "No state changes to commit"
          fi
